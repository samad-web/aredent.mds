# Ardent MDS — nginx reverse proxy.
# Install to /etc/nginx/sites-available/ardent and symlink into sites-enabled.
# Replace YOUR_DOMAIN below, then run certbot to add the 443 TLS block.

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # MCC PDF imports POST large JSON payloads (server caps at 20mb).
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # PDF parse can take 10-15s for a 9MB MCC PDF — don't time out early.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
